name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  docs-consistency:
    name: Docs consistency gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run docs consistency checks
        run: bash scripts/check_docs_consistency.sh

  sim-gates:
    name: Simulation required gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Verilator + build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator make g++

      - name: Install simulation Python dependencies
        run: python -m pip install --upgrade pip && pip install -r sim/requirements.txt

      - name: Run FCSP smoke cocotb gate
        working-directory: sim
        run: make test-fcsp-smoke-cocotb

      - name: Run serial mux cocotb gate
        working-directory: sim
        run: make test-serial-mux-cocotb
