<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">FCSP command translation pipeline</title>
  <desc id="desc">Diagram showing translation from legacy Betaflight and INAV commands into FCSP control payloads and framed transport over SPI.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .box { fill: #111827; stroke: #60a5fa; stroke-width: 2; rx: 12; }
      .txt { fill: #e5e7eb; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 16px; }
      .sub { fill: #93c5fd; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 13px; }
      .arrow { stroke: #60a5fa; stroke-width: 2.5; marker-end: url(#arrowhead); }
      .label { fill: #bfdbfe; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 12px; }
      .title { fill: #f8fafc; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 20px; font-weight: 700; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="320"/>
  <text class="title" x="28" y="36">INAV / Betaflight Intent → FCSP Translation</text>

  <rect class="box" x="30" y="90" width="210" height="140"/>
  <text class="txt" x="45" y="130">Legacy Command</text>
  <text class="sub" x="45" y="156">MSP / stack-specific IDs</text>
  <text class="sub" x="45" y="176">+ raw payload bytes</text>

  <rect class="box" x="270" y="90" width="220" height="140"/>
  <text class="txt" x="285" y="130">Intent Normalize</text>
  <text class="sub" x="285" y="156">passthrough_enter</text>
  <text class="sub" x="285" y="176">set_motor_speed, ping, ...</text>

  <rect class="box" x="520" y="90" width="230" height="140"/>
  <text class="txt" x="535" y="130">FCSP CONTROL Op</text>
  <text class="sub" x="535" y="156">op_id:u8 + op bytes</text>
  <text class="sub" x="535" y="176">big-endian multibyte</text>

  <rect class="box" x="780" y="90" width="220" height="140"/>
  <text class="txt" x="795" y="130">FCSP Frame Encode</text>
  <text class="sub" x="795" y="156">sync, ver, flags, ch</text>
  <text class="sub" x="795" y="176">seq, len, payload, crc</text>

  <rect class="box" x="1030" y="90" width="140" height="140"/>
  <text class="txt" x="1050" y="130">Transport</text>
  <text class="sub" x="1050" y="156">SPI primary</text>
  <text class="sub" x="1050" y="176">profile</text>

  <line class="arrow" x1="240" y1="160" x2="268" y2="160"/>
  <line class="arrow" x1="490" y1="160" x2="518" y2="160"/>
  <line class="arrow" x1="750" y1="160" x2="778" y2="160"/>
  <line class="arrow" x1="1000" y1="160" x2="1028" y2="160"/>

  <text class="label" x="245" y="148">normalize</text>
  <text class="label" x="495" y="148">map</text>
  <text class="label" x="755" y="148">wrap</text>
  <text class="label" x="1006" y="148">send</text>
</svg>
